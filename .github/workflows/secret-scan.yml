name: Secret Scan

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  local-security-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: pip install -e .

      - name: Run security check
        run: python -m content_engine.main security-check
